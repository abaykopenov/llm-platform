# ============================================================
#  NFS Exports Configuration
#  Deploy on Server 1 (192.168.8.9) — NFS Master
# ============================================================
#
#  Install: sudo apt install nfs-kernel-server
#  Apply:   sudo exportfs -arv
#  Check:   sudo exportfs -v
#
# ────────────────────────────────────────────────────────────

# Shared models directory — all LLM model weights
/shared/models    192.168.8.0/24(rw,sync,no_subtree_check,no_root_squash)

# Shared uploads directory — user uploaded files for RAG
/shared/uploads   192.168.8.0/24(rw,sync,no_subtree_check,no_root_squash)

# ────────────────────────────────────────────────────────────
#  On Server 2 (client), mount with:
#
#  sudo mkdir -p /shared/models /shared/uploads
#  sudo mount -t nfs -o nfsvers=4.2 192.168.8.9:/shared/models /shared/models
#  sudo mount -t nfs -o nfsvers=4.2 192.168.8.9:/shared/uploads /shared/uploads
#
#  For persistent mounts, add to /etc/fstab:
#  192.168.8.9:/shared/models  /shared/models  nfs  nfsvers=4.2,rw  0  0
#  192.168.8.9:/shared/uploads /shared/uploads nfs  nfsvers=4.2,rw  0  0
#
#  For RDMA (if ConnectX-7 is configured):
#  sudo mount -t nfs -o nfsvers=4.2,proto=rdma 192.168.8.9:/shared/models /shared/models
# ────────────────────────────────────────────────────────────
