# ============================================================
#  vLLM Inference — Model Configuration
# ============================================================

models:
  - name: "qwen-72b"
    path: "/models/Qwen2.5-72B-Instruct-AWQ"
    tensor_parallel_size: 2        # Distributed across 2 GPUs
    max_model_len: 65536
    gpu_memory_utilization: 0.90
    dtype: "auto"
    quantization: "awq"

  - name: "qwen-7b-fast"
    path: "/models/Qwen2.5-7B-Instruct"
    tensor_parallel_size: 1        # Single GPU
    max_model_len: 32768
    gpu_memory_utilization: 0.85
    dtype: "auto"

embedding_model:
  name: "bge-m3"
  path: "/models/bge-m3"
  device: "cuda:0"

server:
  host: "0.0.0.0"
  port: 8300
  api_key: ""                       # Optional API key
  max_num_seqs: 64                  # Max concurrent sequences
  max_num_batched_tokens: 32768     # Max batch size
